name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # Service container for Payload's build-time DB introspection
    # (PostgreSQL may be needed for type generation during next build).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
          PAYLOAD_SECRET: ci-placeholder-secret-not-for-production
          NEXT_PUBLIC_SITE_URL: https://qrsrisk.com

      # Start the dev server and wait for it to be ready
      - name: Start server
        run: |
          npm run start > /tmp/server.log 2>&1 &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
          PAYLOAD_SECRET: ci-placeholder-secret-not-for-production
          NEXT_PUBLIC_SITE_URL: https://qrsrisk.com

      # Run Lighthouse CI against the running server
      - name: Lighthouse CI
        run: npx @lhci/cli autorun
